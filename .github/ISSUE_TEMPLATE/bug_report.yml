name: 🐛 Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security issues**, do not use this form —
        see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I click Auto-Snap, the module …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Click …
        3. See …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v1.0.2 or commit hash
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Desktop (Electron, Windows)
        - Desktop (Electron, macOS/Linux)
        - Browser (Chromium)
        - Other
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshots / console output
      description: Drag images here; paste any DevTools console errors.
